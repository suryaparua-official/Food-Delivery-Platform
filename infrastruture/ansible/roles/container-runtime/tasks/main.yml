---
- name: Add containerd repository GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add containerd repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install containerd
  apt:
    name:
      - containerd.io={{ containerd_version }}*
    state: present
    update_cache: yes

- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate default containerd config
  shell: containerd config default > /etc/containerd/config.toml

- name: Update containerd config for Kubernetes
  lineinfile:
    path: /etc/containerd/config.toml
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  with_items:
    - regexp: "SystemdCgroup = false"
      line: "            SystemdCgroup = true"

- name: Restart containerd
  systemd:
    name: containerd
    state: restarted
    enabled: yes
    daemon_reload: yes

- name: Configure containerd cgroup driver
  block:
    - name: Check if cgroup section exists
      lineinfile:
        path: /etc/containerd/config.toml
        line: '[plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]'
        state: present
        create: yes
    - name: Set SystemdCgroup to true
      ini_file:
        path: /etc/containerd/config.toml
        section: plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options
        option: SystemdCgroup
        value: "true"
        state: present
      notify: restart containerd
