[masters]
master-1 ansible_host=10.0.10.1 kubernetes_role=master
master-2 ansible_host=10.0.11.1 kubernetes_role=master
master-3 ansible_host=10.0.12.1 kubernetes_role=master

[workers]
worker-1 ansible_host=10.0.10.2 kubernetes_role=worker
worker-2 ansible_host=10.0.11.2 kubernetes_role=worker
worker-3 ansible_host=10.0.12.2 kubernetes_role=worker

[kubernetes_cluster:children]
masters
workers

[kubernetes_cluster:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/kubernetes-key.pem
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# Cluster Configuration
cluster_name=food-delivery-prod
cluster_endpoint=food-delivery-prod.example.com
kubernetes_version=1.28.0
pod_network_cidr=172.16.0.0/16
service_network_cidr=10.96.0.0/12
dns_domain=cluster.local

# Container Runtime
container_runtime=containerd
containerd_version=1.7.0

# Helm
helm_version=3.12.0
helm_repo_url=https://charts.bitnami.com/bitnami

# Network Plugin
network_plugin=flannel
flannel_version=v0.22.0

# Monitoring
enable_monitoring=true
prometheus_version=v2.45.0
grafana_version=10.0.0

# Logging
enable_logging=true
loki_version=2.9.0

# Istio
enable_istio=true
istio_version=1.18.0

# OpenTelemetry
enable_opentelemetry=true
otel_collector_version=0.85.0

environment=prod
