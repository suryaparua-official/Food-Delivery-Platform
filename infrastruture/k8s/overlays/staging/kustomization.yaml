apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: food-delivery

bases:
  - ../../base/namespace
  - ../../base/security
  - ../../base/services
  - ../../base/infrastructure
  - ../../base/monitoring
  - ../../base/observability

commonLabels:
  environment: staging
  team: platform

commonAnnotations:
  managed-by: argocd
  deployment-date: "2024"

replicas:
  - name: auth-service
    count: 2
  - name: restaurant-service
    count: 2
  - name: utils-service
    count: 2
  - name: realtime-service
    count: 2
  - name: rider-service
    count: 2
  - name: admin-service
    count: 1
  - name: frontend
    count: 2
  - name: api-gateway
    count: 2

images:
  - name: YOUR_ECR_REGISTRY/auth-service
    newTag: staging-latest
  - name: YOUR_ECR_REGISTRY/restaurant-service
    newTag: staging-latest
  - name: YOUR_ECR_REGISTRY/utils-service
    newTag: staging-latest
  - name: YOUR_ECR_REGISTRY/realtime-service
    newTag: staging-latest
  - name: YOUR_ECR_REGISTRY/rider-service
    newTag: staging-latest
  - name: YOUR_ECR_REGISTRY/admin-service
    newTag: staging-latest
  - name: YOUR_ECR_REGISTRY/frontend
    newTag: staging-latest

patchesStrategicMerge:
  - deployment-resources-staging.yaml
