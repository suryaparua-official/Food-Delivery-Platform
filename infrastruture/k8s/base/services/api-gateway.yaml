apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: food-delivery
data:
  nginx.conf: |
    events {
      worker_connections 2048;
    }

    http {
      resolver kube-dns.kube-system.svc.cluster.local valid=10s;
      
      upstream auth_service {
        server auth-service:5000;
      }

      upstream admin_service {
        server admin-service:5006;
      }

      upstream restaurant_service {
        server restaurant-service:5001;
      }

      upstream rider_service {
        server rider-service:5005;
      }

      upstream utils_service {
        server utils-service:5002;
      }

      upstream realtime_service {
        server realtime-service:5004;
      }

      upstream frontend {
        server frontend:3000;
      }

      server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Frontend
        location / {
          proxy_pass http://frontend;
        }

        # Auth Service
        location ~ /api/auth(/|$) {
          proxy_pass http://auth_service;
        }

        # Admin Service
        location ~ /api/v1(/|$) {
          proxy_pass http://admin_service;
        }

        # Restaurant Service
        location ~ /api/restaurant(/|$) {
          proxy_pass http://restaurant_service;
        }

        location ~ /api/item(/|$) {
          proxy_pass http://restaurant_service;
        }

        location ~ /api/cart(/|$) {
          proxy_pass http://restaurant_service;
        }

        location ~ /api/address(/|$) {
          proxy_pass http://restaurant_service;
        }

        location ~ /api/order(/|$) {
          proxy_pass http://restaurant_service;
        }

        # Rider Service
        location ~ /api/rider(/|$) {
          proxy_pass http://rider_service;
        }

        # Utils Service
        location ~ /api/upload(/|$) {
          proxy_pass http://utils_service;
        }

        location ~ /api/payment/create(/|$) {
          proxy_pass http://utils_service;
        }

        location ~ /api/payment/verify(/|$) {
          proxy_pass http://utils_service;
        }

        location ~ /api/payment/stripe/create(/|$) {
          proxy_pass http://utils_service;
        }

        location ~ /api/payment/stripe/verify(/|$) {
          proxy_pass http://utils_service;
        }

        # Realtime Service
        location ~ /api/v1/internal(/|$) {
          proxy_pass http://realtime_service;
        }

        # WebSocket
        location /socket.io/ {
          proxy_pass http://realtime_service;

          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "Upgrade";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          proxy_read_timeout 86400;
        }

        # Health check
        location /health {
          return 200 "API Gateway is healthy\n";
          add_header Content-Type text/plain;
        }
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: food-delivery
  labels:
    app: api-gateway
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: food-delivery-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
      containers:
        - name: api-gateway
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx
            - name: tmp
              mountPath: /tmp
            - name: var-run
              mountPath: /var/run
            - name: var-cache
              mountPath: /var/cache/nginx
      volumes:
        - name: nginx-config
          configMap:
            name: api-gateway-config
        - name: tmp
          emptyDir: {}
        - name: var-run
          emptyDir: {}
        - name: var-cache
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - api-gateway
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: food-delivery
  labels:
    app: api-gateway
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8081
      targetPort: 80
      protocol: TCP
