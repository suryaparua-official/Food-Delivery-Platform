apiVersion: v1
kind: Namespace
metadata:
  name: food-delivery
  labels:
    name: food-delivery
    environment: production

---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    name: monitoring
    environment: production

---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    name: observability
    environment: production

---
apiVersion: v1
kind: Namespace
metadata:
  name: infrastructure
  labels:
    name: infrastructure
    environment: production

---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels:
    name: argocd
    environment: production

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: food-delivery-quota
  namespace: food-delivery
spec:
  hard:
    requests.cpu: "100"
    requests.memory: "200Gi"
    limits.cpu: "200"
    limits.memory: "400Gi"
    pods: "200"
    services: "50"
    deployments.apps: "50"
  scopeSelector:
    matchExpressions:
      - operator: In
        scopeName: PriorityClass
        values: ["high", "medium"]

---
apiVersion: v1
kind: LimitRange
metadata:
  name: food-delivery-limits
  namespace: food-delivery
spec:
  limits:
    - max:
        cpu: "2"
        memory: "4Gi"
      min:
        cpu: "100m"
        memory: "128Mi"
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "250m"
        memory: "256Mi"
      type: Container
    - max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "100m"
        memory: "128Mi"
      type: Pod
