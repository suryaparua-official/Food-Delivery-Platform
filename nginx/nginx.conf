events {}

http {
    server {
        listen 80;

        # -------- Auth --------
        location /api/auth/ {
            proxy_pass http://auth-service:5000;
        }

        # -------- Restaurant --------
        location /api/restaurant/ {
            proxy_pass http://restaurant-service:5001;
        }

        location /api/cart/ {
            proxy_pass http://restaurant-service:5001;
        }

        location /api/order/ {
            proxy_pass http://restaurant-service:5001;
        }

        location /api/item/ {
            proxy_pass http://restaurant-service:5001;
        }

        location /api/address/ {
            proxy_pass http://restaurant-service:5001;
        }

        # -------- Rider --------
        location /api/rider/ {
            proxy_pass http://rider-service:5005;
        }

        # -------- Admin --------
        location /api/v1/ {
            proxy_pass http://admin-service:5006;
        }

        # -------- Utils --------
        location /api/payment/ {
            proxy_pass http://utils-service:5002;
        }

        location /api/upload/ {
            proxy_pass http://utils-service:5002;
        }

        # -------- Realtime --------
        location /socket.io/ {
            proxy_pass http://realtime-service:5004;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}