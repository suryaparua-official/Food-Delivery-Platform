events {}

http {

  resolver 127.0.0.11;

  # ========================
  # Upstreams
  # ========================
  upstream auth_service {
    server auth-service:5000;
  }

  upstream admin_service {
    server admin-service:5006;
  }

  upstream restaurant_service {
    server restaurant-service:5001;
  }

  upstream rider_service {
    server rider-service:5005;
  }

  upstream utils_service {
    server utils-service:5002;
  }

  upstream realtime_service {
    server realtime-service:5004;
  }

  # ========================
  # Server
  # ========================
  server {
    listen 80;
    server_name localhost;

    # ========================
    # Proxy Settings
    # ========================
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # ========================
    # AUTH SERVICE
    # ========================
    location ~ /api/auth(/|$) {
      proxy_pass http://auth_service;
    }

    # ========================
    # ADMIN SERVICE
    # ========================
    location ~ /api/v1(/|$) {
      proxy_pass http://admin_service;
    }

    # ========================
    # RESTAURANT SERVICE
    # ========================
    location ~ /api/restaurant(/|$) {
      proxy_pass http://restaurant_service;
    }

    location ~ /api/item(/|$) {
      proxy_pass http://restaurant_service;
    }

    location ~ /api/cart(/|$) {
      proxy_pass http://restaurant_service;
    }

    location ~ /api/address(/|$) {
      proxy_pass http://restaurant_service;
    }

    location ~ /api/order(/|$) {
      proxy_pass http://restaurant_service;
    }

    # ========================
    # RIDER SERVICE
    # ========================
    location ~ /api/rider(/|$) {
      proxy_pass http://rider_service;
    }

    # ========================
    # UTILS SERVICE (FULL)
    # ========================

    # Cloudinary Upload
    location ~ /api/upload(/|$) {
      proxy_pass http://utils_service;
    }

    # Razorpay
    location ~ /api/payment/create(/|$) {
      proxy_pass http://utils_service;
    }

    location ~ /api/payment/verify(/|$) {
      proxy_pass http://utils_service;
    }

    # Stripe
    location ~ /api/payment/stripe/create(/|$) {
      proxy_pass http://utils_service;
    }

    location ~ /api/payment/stripe/verify(/|$) {
      proxy_pass http://utils_service;
    }

    # ========================
    # REALTIME SERVICE
    # ========================
    location ~ /api/v1/internal(/|$) {
      proxy_pass http://realtime_service;
    }

    # ========================
    # WebSocket
    # ========================
    location /socket.io/ {
      proxy_pass http://realtime_service;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket specific timeouts
      proxy_read_timeout 86400;
    }

    # ========================
    # Health Check
    # ========================
    location /health {
      return 200 "API Gateway is healthy";
    }
  }
}