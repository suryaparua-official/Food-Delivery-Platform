name: Food Delivery Platform - Secure CI/CD with OWASP, Trivy & SonarQube

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "app/**"
      - ".github/workflows/**"
      - "infrastruture/**"
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: docker.io
  REGISTRY_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
  SONARQUBE_URL: ${{ secrets.SONARQUBE_URL }}
  SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
  GIT_COMMIT: ${{ github.sha }}
  GIT_BRANCH: ${{ github.ref_name }}

jobs:
  # ============================================================================
  # SECURITY SCANNING - OWASP Dependency Check
  # ============================================================================
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Food-Delivery-Platform'
          path: './app'
          format: 'JSON'
          args: >
            --enable-experimental
            --scan ./app/services
            --scan ./app/frontend

      - name: Upload OWASP Results
        uses: actions/upload-artifact@v3
        with:
          name: owasp-dependency-check-report
          path: dependency-check-report.json
        if: always()

  # ============================================================================
  # CODE QUALITY - SonarQube Analysis
  # ============================================================================
  sonarqube-analysis:
    name: SonarQube Code Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: |
          cd app/frontend
          npm ci
        continue-on-error: true

      - name: Install Service Dependencies
        run: |
          for service in app/services/*/; do
            if [ -f "$service/package.json" ]; then
              cd "$service"
              npm ci
              cd - > /dev/null
            fi
          done
        continue-on-error: true

      - name: Run SonarQube Analysis
        uses: SonarSource/sonarcloud-github-action@master
        if: env.SONARQUBE_TOKEN != ''
        with:
          args: >
            -Dsonar.projectKey=food-delivery-platform
            -Dsonar.sources=app/services,app/frontend/src
            -Dsonar.exclusions=**/*.spec.ts,**/*.test.ts,**/node_modules/**
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.verbose=true
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # SECURITY SCANNING - Secret Detection
  # ============================================================================
  secret-scanning:
    name: Detect Secrets in Code
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug

      - name: Run Detect Secrets
        uses: detectsecrets/detectsecrets-action@v1.1.0
        with:
          path: ./
          baseline: .secrets.baseline
          indicator-ci: true

  # ============================================================================
  # BUILD PHASE - Build and Test Services
  # ============================================================================
  build:
    name: Build & Test Services
    runs-on: ubuntu-latest
    needs: [owasp-dependency-check, sonarqube-analysis, secret-scanning]
    outputs:
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      auth-image: ${{ steps.meta-auth.outputs.tags }}
      restaurant-image: ${{ steps.meta-restaurant.outputs.tags }}
      utils-image: ${{ steps.meta-utils.outputs.tags }}
      realtime-image: ${{ steps.meta-realtime.outputs.tags }}
      rider-image: ${{ steps.meta-rider.outputs.tags }}
      admin-image: ${{ steps.meta-admin.outputs.tags }}
      build-version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Version
        id: version
        run: |
          VERSION="${{ github.ref_name }}-${{ github.run_number }}-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      # ========== Frontend ==========
      - name: Extract Frontend Metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/food-delivery-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # ========== Auth Service ==========
      - name: Extract Auth Service Metadata
        id: meta-auth
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/food-delivery-auth-service
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and Push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./app/services/auth-service
          push: true
          tags: ${{ steps.meta-auth.outputs.tags }}
          labels: ${{ steps.meta-auth.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # ========== Restaurant Service ==========
      - name: Extract Restaurant Service Metadata
        id: meta-restaurant
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/food-delivery-restaurant-service
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and Push Restaurant Service
        uses: docker/build-push-action@v5
        with:
          context: ./app/services/restaurant-service
          push: true
          tags: ${{ steps.meta-restaurant.outputs.tags }}
          labels: ${{ steps.meta-restaurant.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # ========== Utils Service ==========
      - name: Extract Utils Service Metadata
        id: meta-utils
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/food-delivery-utils-service
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and Push Utils Service
        uses: docker/build-push-action@v5
        with:
          context: ./app/services/utils-service
          push: true
          tags: ${{ steps.meta-utils.outputs.tags }}
          labels: ${{ steps.meta-utils.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # ========== Realtime Service ==========
      - name: Extract Realtime Service Metadata
        id: meta-realtime
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/food-delivery-realtime-service
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and Push Realtime Service
        uses: docker/build-push-action@v5
        with:
          context: ./app/services/realtime-service
          push: true
          tags: ${{ steps.meta-realtime.outputs.tags }}
          labels: ${{ steps.meta-realtime.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # ========== Rider Service ==========
      - name: Extract Rider Service Metadata
        id: meta-rider
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/food-delivery-rider-service
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and Push Rider Service
        uses: docker/build-push-action@v5
        with:
          context: ./app/services/rider-service
          push: true
          tags: ${{ steps.meta-rider.outputs.tags }}
          labels: ${{ steps.meta-rider.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # ========== Admin Service ==========
      - name: Extract Admin Service Metadata
        id: meta-admin
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/food-delivery-admin-service
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and Push Admin Service
        uses: docker/build-push-action@v5
        with:
          context: ./app/services/admin-service
          push: true
          tags: ${{ steps.meta-admin.outputs.tags }}
          labels: ${{ steps.meta-admin.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ============================================================================
  # SECURITY SCANNING - Trivy Container Image Scanning
  # ============================================================================
  trivy-scan:
    name: Trivy Container Image Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write

    strategy:
      matrix:
        service:
          - image: ${{ needs.build.outputs.frontend-image }}
            name: frontend
          - image: ${{ needs.build.outputs.auth-image }}
            name: auth-service
          - image: ${{ needs.build.outputs.restaurant-image }}
            name: restaurant-service
          - image: ${{ needs.build.outputs.utils-image }}
            name: utils-service
          - image: ${{ needs.build.outputs.realtime-image }}
            name: realtime-service
          - image: ${{ needs.build.outputs.rider-image }}
            name: rider-service
          - image: ${{ needs.build.outputs.admin-image }}
            name: admin-service

    steps:
      - name: Run Trivy Vulnerability Scan - ${{ matrix.service.name }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service.image }}
          format: 'sarif'
          output: 'trivy-${{ matrix.service.name }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy SARIF Report
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-${{ matrix.service.name }}.sarif'
          category: 'trivy-${{ matrix.service.name }}'
        if: always()

      - name: Run Trivy JSON Report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service.image }}
          format: 'json'
          output: 'trivy-${{ matrix.service.name }}.json'

      - name: Upload Trivy Results
        uses: actions/upload-artifact@v3
        with:
          name: trivy-reports
          path: trivy-${{ matrix.service.name }}.json
        if: always()

  # ============================================================================
  # INFRASTRUCTURE - Terraform Validation
  # ============================================================================
  terraform-validate:
    name: Terraform Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        run: cd infrastruture/terraform/aws && terraform init -backend=false
        continue-on-error: true

      - name: Terraform Format Check
        run: cd infrastruture/terraform && terraform fmt -check -recursive

      - name: Terraform Validate
        run: cd infrastruture/terraform/aws && terraform validate
        continue-on-error: true

      - name: TFLint Analysis
        uses: terraform-linters/setup-tflint@v3
        continue-on-error: true

  # ============================================================================
  # DEPLOYMENT - Manual Approval for Production
  # ============================================================================
  deploy-approval:
    name: Deployment Ready - Awaiting Approval
    runs-on: ubuntu-latest
    needs: [build, trivy-scan, terraform-validate]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Summary
        run: |
          echo "✅ All security checks passed"
          echo "✅ All services built successfully"
          echo "✅ Container images scanned with Trivy"
          echo "✅ Code analyzed with SonarQube"
          echo "✅ Dependencies checked with OWASP"
          echo "✅ Secrets scanned with TruffleHog"
          echo ""
          echo "Ready for deployment to production"
          echo "Build Version: ${{ needs.build.outputs.build-version }}"

  # ============================================================================
  # REPORTING - Generate Reports
  # ============================================================================
  generate-reports:
    name: Generate Security Reports
    runs-on: ubuntu-latest
    needs: [build, trivy-scan, owasp-dependency-check]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v3

      - name: Generate Report Summary
        run: |
          echo "# Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Version:** ${{ needs.build.outputs.build-version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Security Checks" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ OWASP Dependency Check" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SonarQube Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Secret Scanning (TruffleHog)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Container Image Scanning (Trivy)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Terraform Validation" >> $GITHUB_STEP_SUMMARY
