name: Full CI Pipeline (All Services)

on:
  push:
    branches: ["main"]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: ${{ github.run_number }}
  TRIVY_SEVERITY: HIGH,CRITICAL

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # -------------------------
      - name: Install Dependencies
        run: |
          npm ci --prefix frontend

          npm ci --prefix backend/admin-service
          npm ci --prefix backend/auth-service
          npm ci --prefix backend/realtime-service
          npm ci --prefix backend/restaurant-service
          npm ci --prefix backend/rider-service
          npm ci --prefix backend/utils-service

      # -------------------------
      - name: Lint
        run: |
          npm run lint --prefix frontend

          npm run lint --prefix backend/admin-service
          npm run lint --prefix backend/auth-service
          npm run lint --prefix backend/realtime-service
          npm run lint --prefix backend/restaurant-service
          npm run lint --prefix backend/rider-service
          npm run lint --prefix backend/utils-service

      # -------------------------
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # -------------------------
      - name: Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "food-delivery"
          path: "."
          format: "HTML"

      # -------------------------
      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      # -------------------------
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------
      - name: Build Images
        run: |
          docker build -t $DOCKERHUB_USERNAME/frontend:$IMAGE_TAG ./frontend

          docker build -t $DOCKERHUB_USERNAME/admin-service:$IMAGE_TAG ./backend/admin-service
          docker build -t $DOCKERHUB_USERNAME/auth-service:$IMAGE_TAG ./backend/auth-service
          docker build -t $DOCKERHUB_USERNAME/realtime-service:$IMAGE_TAG ./backend/realtime-service
          docker build -t $DOCKERHUB_USERNAME/restaurant-service:$IMAGE_TAG ./backend/restaurant-service
          docker build -t $DOCKERHUB_USERNAME/rider-service:$IMAGE_TAG ./backend/rider-service
          docker build -t $DOCKERHUB_USERNAME/utils-service:$IMAGE_TAG ./backend/utils-service

      # -------------------------
      - name: Trivy Scan (All Images)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image --severity $TRIVY_SEVERITY $DOCKERHUB_USERNAME/frontend:$IMAGE_TAG

          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image --severity $TRIVY_SEVERITY $DOCKERHUB_USERNAME/admin-service:$IMAGE_TAG

          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image --severity $TRIVY_SEVERITY $DOCKERHUB_USERNAME/auth-service:$IMAGE_TAG

          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image --severity $TRIVY_SEVERITY $DOCKERHUB_USERNAME/realtime-service:$IMAGE_TAG

          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image --severity $TRIVY_SEVERITY $DOCKERHUB_USERNAME/restaurant-service:$IMAGE_TAG

          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image --severity $TRIVY_SEVERITY $DOCKERHUB_USERNAME/rider-service:$IMAGE_TAG

          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image --severity $TRIVY_SEVERITY $DOCKERHUB_USERNAME/utils-service:$IMAGE_TAG

      # -------------------------
      - name: Push Images
        run: |
          docker push $DOCKERHUB_USERNAME/frontend:$IMAGE_TAG

          docker push $DOCKERHUB_USERNAME/admin-service:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/auth-service:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/realtime-service:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/restaurant-service:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/rider-service:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/utils-service:$IMAGE_TAG
